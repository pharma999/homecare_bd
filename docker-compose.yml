version: "3.9"

services:
  api:
    build: .
    container_name: home_care_api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GIN_MODE=release
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=home_care_db
      - JWT_SECRET=change_this_in_production
      - JWT_EXPIRY_HOURS=720
      - OTP_TEST_MODE=true
      - OTP_TEST_VALUE=5555
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: home_care_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  mongo-express:
    image: mongo-express:1.0
    container_name: home_care_mongo_ui
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data:
